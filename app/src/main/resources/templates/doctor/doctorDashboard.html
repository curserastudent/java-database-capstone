<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Dashboard</title>

    <link rel="icon" type="image/png" href="/assets/images/logo/logo.png" th:href="@{/assets/images/logo/logo.png}">

    <link rel="stylesheet" href="/assets/css/adminDashboard.css" th:href="@{/assets/css/adminDashboard.css}">
    <link rel="stylesheet" href="/assets/css/doctorDashboard.css" th:href="@{/assets/css/doctorDashboard.css}">
    <link rel="stylesheet" href="/assets/css/style.css" th:href="@{/assets/css/style.css}">

    <script src="/js/render.js" th:src="@{/js/render.js}" defer></script>
    <script src="/js/util.js" th:src="@{/js/util.js}" defer></script>
    <script src="/js/components/header.js" th:src="@{/js/components/header.js}" defer></script>
    <script src="/js/components/footer.js" th:src="@{/js/components/footer.js}" defer></script>
    <script type="module" src="/js/doctorDashboard.js" th:src="@{/js/doctorDashboard.js}" defer></script>
</head>

<body onload="renderContent()">
    <div class="container">
        <div class="wrapper">
            <div id="header"></div>

            <main class="main-content">
                <h2 class="table-header">Doctor Dashboard</h2>

                <input type="text" id="searchBar" class="searchBar" placeholder="Search patient by name">

                <div class="filter-wrapper">
                    <button id="todayButton" class="today-btn" type="button">Today</button>
                    <input type="date" id="datePicker" class="date-picker">
                </div>

                <table>
                    <thead>
                        <tr>
                            <th>Patient ID</th>
                            <th>Name</th>
                            <th>Phone No.</th>
                            <th>Email</th>
                            <th>Prescription</th>
                        </tr>
                    </thead>
                    <tbody id="patientTableBody"></tbody>
                </table>
            </main>

            <div id="footer"></div>
        </div>
    </div>
</body>

</html>
