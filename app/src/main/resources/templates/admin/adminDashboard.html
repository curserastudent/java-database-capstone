<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>

    <link rel="icon" type="image/png" href="/assets/images/logo/logo.png" th:href="@{/assets/images/logo/logo.png}">

    <link rel="stylesheet" href="/assets/css/adminDashboard.css" th:href="@{/assets/css/adminDashboard.css}">
    <link rel="stylesheet" href="/assets/css/style.css" th:href="@{/assets/css/style.css}">

    <script src="/js/render.js" th:src="@{/js/render.js}" defer></script>
    <script src="/js/util.js" th:src="@{/js/util.js}" defer></script>
    <script src="/js/components/header.js" th:src="@{/js/components/header.js}" defer></script>
    <script src="/js/components/footer.js" th:src="@{/js/components/footer.js}" defer></script>
</head>

<body onload="renderContent()">
    <div class="container">
        <div class="wrapper">
            <div id="header"></div>

            <main class="main-content">
                <h2>Admin Dashboard</h2>

                <input
                    type="text"
                    id="searchBar"
                    class="searchBar"
                    placeholder="Search doctors by name">

                <div class="filters">
                    <select id="timeFilter" class="filterSelect">
                        <option value="">All Times</option>
                        <option value="09:00-10:00">9:00 AM - 10:00 AM</option>
                        <option value="10:00-11:00">10:00 AM - 11:00 AM</option>
                        <option value="11:00-12:00">11:00 AM - 12:00 PM</option>
                        <option value="12:00-13:00">12:00 PM - 1:00 PM</option>
                    </select>

                    <select id="specializationFilter" class="filterSelect">
                        <option value="">All Specialties</option>
                        <option value="cardiologist">Cardiologist</option>
                        <option value="dermatologist">Dermatologist</option>
                        <option value="neurologist">Neurologist</option>
                        <option value="pediatrician">Pediatrician</option>
                        <option value="orthopedic">Orthopedic</option>
                        <option value="gynecologist">Gynecologist</option>
                        <option value="psychiatrist">Psychiatrist</option>
                        <option value="dentist">Dentist</option>
                        <option value="ophthalmologist">Ophthalmologist</option>
                        <option value="ent">ENT Specialist</option>
                        <option value="urologist">Urologist</option>
                        <option value="oncologist">Oncologist</option>
                        <option value="gastroenterologist">Gastroenterologist</option>
                        <option value="general">General Physician</option>
                    </select>
                </div>

                <div id="content"></div>
            </main>

            <div id="footer"></div>
        </div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close" id="closeModal">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <script type="module" src="/js/adminDashboard.js" th:src="@{/js/adminDashboard.js}" defer></script>
    <script type="module" src="/js/components/doctorCard.js" th:src="@{/js/components/doctorCard.js}" defer></script>
</body>

</html>
